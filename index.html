<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board Class</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!--Toolbox Navbar-->
    <div class="toolbox-cont">

        <!-- Filter colors -->
        <div class="toolbox-filter-colors">
            <div class="lightpink color-box"></div>
            <div class="lightblue color-box"></div>
            <div class="lightgreen color-box"></div>
            <div class="black color-box"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-btn-cont">
            <div class="add-btn">
                <i class="fa-solid fa-plus"></i>
            </div>
            <div class="remove-btn">
                <i class="fa-solid fa-trash"></i>
            </div>
        </div>

    </div>

     <!-- Ticket Creation -->
     <div class="main-cont">
         <!-- <div class="ticket-cont">
            <div class="ticket-color"></div>
            <div class="ticket-id">12345</div>
            <div class="task-area">heloo</div>
            <div class="ticket-lock">
                <i class="fa-solid fa-lock"></i>
            </div>
            
        </div> -->
     </div>
    

    <!-- Modal POp Up -->
    <div class="modal-cont">

        <textarea class="text-area"></textarea>

        <div class="priority-color-cont">
            <div class="lightpink priority-color active"></div>
            <div class="lightblue priority-color"></div>
            <div class="lightgreen priority-color"></div>
            <div class="black priority-color"></div>
        </div>
    </div>

   

</body>
<script src="script.js"></script>
</html>
